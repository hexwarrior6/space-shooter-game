<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射击 - Space Shooter</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050510;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border: 2px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3),
                        inset 0 0 30px rgba(0, 255, 136, 0.1);
            border-radius: 4px;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .score, .lives {
            color: #ffffff;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .powerup-timer {
            position: absolute;
            top: 50px;
            left: 20px;
            color: #ffff00;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
            pointer-events: none;
        }

        .powerup-timer .active {
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        .lives span {
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.8);
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.5s;
        }

        .menu-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .menu-title {
            font-size: 48px;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8),
                         0 0 40px rgba(0, 255, 136, 0.4);
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .menu-subtitle {
            font-size: 16px;
            color: #00ffff;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .final-score {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 30px;
        }

        .final-score span {
            color: #00ffff;
            font-weight: 700;
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .start-btn:hover {
            background: #00ff88;
            color: #0a0a1a;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .version-info {
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: #444;
            font-size: 11px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="ui-overlay">
            <div class="score">分数: <span id="scoreValue">0</span></div>
            <div class="lives">生命: <span id="livesValue">❤❤❤</span></div>
        </div>
        <div class="powerup-timer">
            <div id="doubleShotTimer" style="display: none;">双排射击: <span>0</span>s</div>
            <div id="laserTimer" style="display: none;">激光枪: <span>0</span>s</div>
            <div id="invincibleTimer" style="display: none;">无敌: <span>0</span>s</div>
        </div>
        <div class="menu-overlay" id="menuOverlay">
            <div class="menu-title">太空射击</div>
            <div class="menu-subtitle">SPACE SHOOTER</div>
            <div class="final-score" id="finalScore" style="display: none;">最终得分: <span>0</span></div>
            <button class="start-btn" id="startBtn">开始游戏</button>
            <div class="controls-hint">WASD/方向键 移动 | 空格 射击</div>
            <div class="version-info" id="versionInfo">v1.0.0 · 8d5a572</div>
        </div>
    </div>

    <script src="version.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreValue = document.getElementById('scoreValue');
        const livesValue = document.getElementById('livesValue');
        const menuOverlay = document.getElementById('menuOverlay');
        const startBtn = document.getElementById('startBtn');
        const finalScoreEl = document.getElementById('finalScore');

        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let frameCount = 0;

        // 玩家
        const player = {
            x: 400,
            y: 520,
            width: 30,
            height: 40,
            speed: 6,
            shootCooldown: 0
        };

        // 子弹数组
        let playerBullets = [];
        let enemyBullets = [];

        // 敌人数组
        let enemies = [];

        // 星星背景
        let stars = [];

        // 粒子效果
        let particles = [];

        // 升级道具
        let powerups = [];

        // 玩家升级状态
        const playerPowerups = {
            doubleShot: { active: false, timer: 0, duration: 600 }, // 60fps * 10s = 600
            laser: { active: false, timer: 0, duration: 600 },
            invincible: { active: false, timer: 0, duration: 600 }
        };

        // 升级类型定义
        const powerupTypes = [
            { type: 'doubleShot', color: '#00ffff', name: '双排射击' },
            { type: 'laser', color: '#ff00ff', name: '激光枪' },
            { type: 'invincible', color: '#ffff00', name: '无敌' }
        ];

        // 按键状态
        const keys = {
            up: false,
            down: false,
            left: false,
            right: false,
            shoot: false
        };

        // 初始化星星
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 1 + 0.5,
                    brightness: Math.random()
                });
            }
        }

        // 更新星星
        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                star.brightness = 0.5 + Math.sin(frameCount * 0.05 + star.x) * 0.5;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // 绘制星星
        function drawStars() {
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness * 0.8})`;
                ctx.fill();
            });
        }

        // 绘制玩家飞机
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);

            // 无敌状态闪烁效果
            if (playerPowerups.invincible.active && Math.floor(frameCount / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            // 引擎尾焰
            const flameLength = 15 + Math.sin(frameCount * 0.3) * 5;
            ctx.beginPath();
            ctx.moveTo(-8, 15);
            ctx.lineTo(0, 15 + flameLength);
            ctx.lineTo(8, 15);
            ctx.closePath();
            const gradient = ctx.createLinearGradient(0, 15, 0, 15 + flameLength);
            gradient.addColorStop(0, playerPowerups.invincible.active ? '#ffff00' : '#00ff88');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fill();

            // 机身
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(-15, 20);
            ctx.lineTo(0, 12);
            ctx.lineTo(15, 20);
            ctx.closePath();
            ctx.fillStyle = playerPowerups.invincible.active ? '#ffff00' : '#00ff88';
            ctx.fill();
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 驾驶舱
            ctx.beginPath();
            ctx.arc(0, -5, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffff';
            ctx.fill();

            // 无敌护盾效果
            if (playerPowerups.invincible.active) {
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 0, ${0.3 + Math.sin(frameCount * 0.1) * 0.2})`;
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            ctx.restore();
        }

        // 更新玩家
        function updatePlayer() {
            if (keys.up && player.y > 25) player.y -= player.speed;
            if (keys.down && player.y < canvas.height - 25) player.y += player.speed;
            if (keys.left && player.x > 20) player.x -= player.speed;
            if (keys.right && player.x < canvas.width - 20) player.x += player.speed;

            if (player.shootCooldown > 0) player.shootCooldown--;

            if (keys.shoot && player.shootCooldown === 0) {
                // 根据升级状态选择射击方式
                if (playerPowerups.laser.active) {
                    // 激光枪 - 穿透性激光
                    playerBullets.push({
                        x: player.x,
                        y: player.y - 25,
                        width: 8,
                        height: 40,
                        speed: 15,
                        isLaser: true,
                        damage: 3
                    });
                    player.shootCooldown = 8;
                } else if (playerPowerups.doubleShot.active) {
                    // 双排射击
                    playerBullets.push({
                        x: player.x - 10,
                        y: player.y - 25,
                        width: 4,
                        height: 15,
                        speed: 10
                    });
                    playerBullets.push({
                        x: player.x + 10,
                        y: player.y - 25,
                        width: 4,
                        height: 15,
                        speed: 10
                    });
                    player.shootCooldown = 10;
                } else {
                    // 普通射击
                    playerBullets.push({
                        x: player.x,
                        y: player.y - 25,
                        width: 4,
                        height: 15,
                        speed: 10
                    });
                    player.shootCooldown = 10;
                }
            }

            // 更新升级状态
            for (const key in playerPowerups) {
                const pu = playerPowerups[key];
                if (pu.active) {
                    pu.timer--;
                    if (pu.timer <= 0) {
                        pu.active = false;
                    }
                }
            }
        }

        // 绘制子弹
        function drawBullets() {
            // 玩家子弹
            playerBullets.forEach(bullet => {
                if (bullet.isLaser) {
                    // 激光枪效果
                    ctx.save();
                    ctx.shadowColor = '#ff00ff';
                    ctx.shadowBlur = 20;
                    const gradient = ctx.createLinearGradient(0, bullet.y, 0, bullet.y + bullet.height);
                    gradient.addColorStop(0, '#ff00ff');
                    gradient.addColorStop(0.5, '#ffffff');
                    gradient.addColorStop(1, '#ff00ff');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#00ffff';
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 10;
                    ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                }
            });
            ctx.shadowBlur = 0;

            // 敌人子弹
            ctx.fillStyle = '#ff6600';
            ctx.shadowColor = '#ff6600';
            enemyBullets.forEach(bullet => {
                ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
            });
            ctx.shadowBlur = 0;
        }

        // 更新子弹
        function updateBullets() {
            playerBullets = playerBullets.filter(bullet => {
                bullet.y -= bullet.speed;
                return bullet.y > -bullet.height;
            });

            enemyBullets = enemyBullets.filter(bullet => {
                bullet.y += bullet.speed;
                return bullet.y < canvas.height + bullet.height;
            });
        }

        // 生成敌人
        function spawnEnemy() {
            if (Math.random() < 0.02) {
                enemies.push({
                    x: Math.random() * (canvas.width - 60) + 30,
                    y: -30,
                    width: 30,
                    height: 30,
                    speed: 2 + Math.random() * 1.5,
                    shootTimer: Math.random() * 100,
                    phase: Math.random() * Math.PI * 2,
                    health: 1
                });
            }
        }

        // 生成升级道具
        function spawnPowerup() {
            if (Math.random() < 0.006) { // 约每2-3秒生成一次
                const typeInfo = powerupTypes[Math.floor(Math.random() * powerupTypes.length)];
                powerups.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -20,
                    width: 25,
                    height: 25,
                    speed: 2,
                    type: typeInfo.type,
                    color: typeInfo.color,
                    name: typeInfo.name,
                    pulsePhase: Math.random() * Math.PI * 2
                });
            }
        }

        // 绘制升级道具
        function drawPowerups() {
            powerups.forEach(pu => {
                ctx.save();
                ctx.translate(pu.x, pu.y);

                // 脉冲效果
                const pulse = 1 + Math.sin(frameCount * 0.1 + pu.pulsePhase) * 0.15;
                ctx.scale(pulse, pulse);

                // 光晕
                ctx.shadowColor = pu.color;
                ctx.shadowBlur = 15;

                // 圆形背景
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.fillStyle = pu.color;
                ctx.fill();

                // 内部图标
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.font = 'bold 14px Orbitron';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let icon = '';
                if (pu.type === 'doubleShot') icon = '≡';
                else if (pu.type === 'laser') icon = '⚡';
                else if (pu.type === 'invincible') icon = '★';
                ctx.fillText(icon, 0, 0);

                ctx.restore();
            });
        }

        // 更新升级道具
        function updatePowerups() {
            powerups.forEach(pu => {
                pu.y += pu.speed;
            });
            powerups = powerups.filter(pu => pu.y < canvas.height + 30);
        }

        // 绘制敌人
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);

                // 敌人飞船
                ctx.beginPath();
                ctx.moveTo(0, 15);
                ctx.lineTo(-15, -10);
                ctx.lineTo(0, -5);
                ctx.lineTo(15, -10);
                ctx.closePath();
                ctx.fillStyle = '#ff3366';
                ctx.fill();
                ctx.strokeStyle = '#ff6699';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            });
        }

        // 更新敌人
        function updateEnemies() {
            enemies.forEach(enemy => {
                enemy.y += enemy.speed;
                enemy.x += Math.sin(frameCount * 0.05 + enemy.phase) * 1.5;

                // 限制敌人不飞出边界
                enemy.x = Math.max(20, Math.min(canvas.width - 20, enemy.x));

                // 敌人射击
                enemy.shootTimer--;
                if (enemy.shootTimer <= 0 && enemy.y > 0 && enemy.y < canvas.height - 100) {
                    enemyBullets.push({
                        x: enemy.x,
                        y: enemy.y + 20,
                        width: 4,
                        height: 12,
                        speed: 5
                    });
                    enemy.shootTimer = 80 + Math.random() * 60;
                }
            });

            enemies = enemies.filter(enemy => enemy.y < canvas.height + 50);
        }

        // 创建爆炸粒子
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 30,
                    maxLife: 30,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        // 更新粒子
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life--;
                return p.life > 0;
            });
        }

        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                ctx.fill();
            });
        }

        // 碰撞检测
        function checkCollisions() {
            // 玩家子弹击中敌人
            playerBullets = playerBullets.filter(bullet => {
                let hit = false;
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    if (bullet.x > enemy.x - enemy.width / 2 &&
                        bullet.x < enemy.x + enemy.width / 2 &&
                        bullet.y > enemy.y - enemy.height / 2 &&
                        bullet.y < enemy.y + enemy.height / 2) {
                        if (bullet.isLaser) {
                            // 激光穿透，持续伤害
                            enemy.health -= bullet.damage || 1;
                            if (enemy.health <= 0) {
                                createExplosion(enemy.x, enemy.y, 'rgb(255, 51, 102)');
                                enemies.splice(i, 1);
                                score += 100;
                                scoreValue.textContent = score;
                            }
                        } else {
                            createExplosion(enemy.x, enemy.y, 'rgb(255, 51, 102)');
                            enemies.splice(i, 1);
                            score += 100;
                            scoreValue.textContent = score;
                        }
                        hit = true;
                        if (!bullet.isLaser) break;
                    }
                }
                return bullet.isLaser ? true : !hit;
            });

            // 玩家拾取升级道具
            powerups = powerups.filter(pu => {
                const dx = player.x - pu.x;
                const dy = player.y - pu.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 35) {
                    // 激活对应升级
                    playerPowerups[pu.type].active = true;
                    playerPowerups[pu.type].timer = playerPowerups[pu.type].duration;
                    // 特效
                    createExplosion(pu.x, pu.y, pu.color);
                    return false;
                }
                return true;
            });

            // 敌人子弹击中玩家
            if (!playerPowerups.invincible.active) {
                enemyBullets = enemyBullets.filter(bullet => {
                    if (bullet.x > player.x - 15 &&
                        bullet.x < player.x + 15 &&
                        bullet.y > player.y - 20 &&
                        bullet.y < player.y + 20) {
                        createExplosion(player.x, player.y, 'rgb(0, 255, 136)');
                        lives--;
                        updateLivesDisplay();
                        return false;
                    }
                    return true;
                });

                // 玩家撞敌人
                enemies = enemies.filter(enemy => {
                    const dx = player.x - enemy.x;
                    const dy = player.y - enemy.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 30) {
                        createExplosion(enemy.x, enemy.y, 'rgb(255, 51, 102)');
                        createExplosion(player.x, player.y, 'rgb(0, 255, 136)');
                        lives--;
                        updateLivesDisplay();
                        return false;
                    }
                    return true;
                });
            }

            // 检查游戏结束
            if (lives <= 0) {
                gameOver();
            }
        }

        // 更新生命值显示
        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < lives; i++) {
                hearts += '❤';
            }
            livesValue.textContent = hearts;
        }

        // 更新升级计时器显示
        function updatePowerupTimerDisplay() {
            const doubleShotEl = document.getElementById('doubleShotTimer');
            const laserEl = document.getElementById('laserTimer');
            const invincibleEl = document.getElementById('invincibleTimer');

            if (playerPowerups.doubleShot.active) {
                doubleShotEl.style.display = 'block';
                doubleShotEl.querySelector('span').textContent = Math.ceil(playerPowerups.doubleShot.timer / 60);
                doubleShotEl.classList.add('active');
            } else {
                doubleShotEl.style.display = 'none';
                doubleShotEl.classList.remove('active');
            }

            if (playerPowerups.laser.active) {
                laserEl.style.display = 'block';
                laserEl.querySelector('span').textContent = Math.ceil(playerPowerups.laser.timer / 60);
                laserEl.classList.add('active');
            } else {
                laserEl.style.display = 'none';
                laserEl.classList.remove('active');
            }

            if (playerPowerups.invincible.active) {
                invincibleEl.style.display = 'block';
                invincibleEl.querySelector('span').textContent = Math.ceil(playerPowerups.invincible.timer / 60);
                invincibleEl.classList.add('active');
            } else {
                invincibleEl.style.display = 'none';
                invincibleEl.classList.remove('active');
            }
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            finalScoreEl.querySelector('span').textContent = score;
            finalScoreEl.style.display = 'block';
            document.querySelector('.menu-title').textContent = '游戏结束';
            startBtn.textContent = '重新开始';
            menuOverlay.classList.remove('hidden');
        }

        // 开始游戏
        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            frameCount = 0;
            player.x = 400;
            player.y = 520;
            playerBullets = [];
            enemyBullets = [];
            enemies = [];
            particles = [];
            powerups = [];
            // 重置升级状态
            for (const key in playerPowerups) {
                playerPowerups[key].active = false;
                playerPowerups[key].timer = 0;
            }
            scoreValue.textContent = '0';
            updateLivesDisplay();
            updatePowerupTimerDisplay();
            menuOverlay.classList.add('hidden');
            // 设置版本号显示
            if (typeof VERSION_TAG !== 'undefined' && typeof GAME_VERSION !== 'undefined') {
                document.getElementById('versionInfo').textContent = VERSION_TAG + ' · ' + GAME_VERSION;
            }
            initStars();
            gameLoop();
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameRunning) return;

            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新和绘制
            updateStars();
            drawStars();

            // 升级道具
            spawnPowerup();
            updatePowerups();
            drawPowerups();

            updatePlayer();
            drawPlayer();

            updateBullets();
            drawBullets();

            spawnEnemy();
            updateEnemies();
            drawEnemies();

            updateParticles();
            drawParticles();

            checkCollisions();

            updatePowerupTimerDisplay();

            frameCount++;
            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ') {
                keys.shoot = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === ' ') keys.shoot = false;
        });

        startBtn.addEventListener('click', startGame);

        // 初始化
        initStars();
    </script>
</body>
</html>
